# ============================================================
# RNC — Docker Compose pour environnement de développement
# ============================================================
# Démarrage rapide:
#   docker compose --profile infra up -d        # Eureka + Config + Keycloak + DB + Kafka + RabbitMQ
#   docker compose --profile services up -d     # Tous les microservices
#   docker compose --profile observability up -d # Prometheus + Grafana + Loki + Tempo
# ============================================================

services:

  # ============================================================
  # Infrastructure de base
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: rnc-postgres
    environment:
      POSTGRES_USER: rnc
      POSTGRES_PASSWORD: rnc
      POSTGRES_MULTIPLE_DATABASES: >-
        trust-id,trust-score,trust-qr,trust-credit,trust-escrow,trust-school,
        trust-health,trust-farming,trust-insurance,trust-debt,trust-collect,
        trust-merchant,auth-service,keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rnc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rnc-net]

  redis:
    image: redis:7-alpine
    container_name: rnc-redis
    ports: ["6379:6379"]
    networks: [rnc-net]

  # ============================================================
  # Keycloak — IAM (OIDC/OAuth2)
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: rnc-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: rnc
      KC_DB_PASSWORD: rnc
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./docker/keycloak/rnc-realm.json:/opt/keycloak/data/import/rnc-realm.json:ro
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rnc-net]

  # ============================================================
  # Service Discovery (Eureka)
  # ============================================================
  eureka:
    image: eclipse-temurin:21-jre-jammy
    container_name: rnc-eureka
    working_dir: /app
    command: ["java", "-jar", "eureka-server.jar"]
    volumes:
      - ./infrastructure/eureka-server/target/eureka-server-0.1.0-SNAPSHOT.jar:/app/eureka-server.jar:ro
    ports: ["8761:8761"]
    environment:
      EUREKA_REGISTER: "false"
      EUREKA_FETCH: "false"
    networks: [rnc-net]
    profiles: [infra]

  config-server:
    image: eclipse-temurin:21-jre-jammy
    container_name: rnc-config
    working_dir: /app
    command: ["java", "-jar", "config-server.jar"]
    volumes:
      - ./infrastructure/config-server/target/config-server-0.1.0-SNAPSHOT.jar:/app/config-server.jar:ro
    ports: ["8888:8888"]
    environment:
      EUREKA_URL: http://eureka:8761/eureka/
      CONFIG_PROFILE: native
    depends_on: [eureka]
    networks: [rnc-net]
    profiles: [infra]

  # ============================================================
  # API Gateway
  # ============================================================
  api-gateway:
    image: eclipse-temurin:21-jre-jammy
    container_name: rnc-gateway
    working_dir: /app
    command: ["java", "-jar", "api-gateway.jar"]
    volumes:
      - ./infrastructure/api-gateway/target/api-gateway-0.1.0-SNAPSHOT.jar:/app/api-gateway.jar:ro
    ports: ["8080:8080"]
    environment:
      EUREKA_URL: http://eureka:8761/eureka/
      KEYCLOAK_URL: http://keycloak:8080
      CORS_ORIGINS: http://localhost:3000,http://localhost:8081
    depends_on: [eureka, keycloak]
    networks: [rnc-net]
    profiles: [infra]

  # ============================================================
  # Kafka + Zookeeper (event streaming)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: rnc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [rnc-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rnc-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [rnc-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rnc-kafka-ui
    ports: ["8098:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: rnc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    networks: [rnc-net]
    profiles: [observability]

  # ============================================================
  # RabbitMQ (tâches asynchrones, notifications)
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rnc-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rnc
      RABBITMQ_DEFAULT_PASS: rnc
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [rnc-net]

  # ============================================================
  # Observability — Prometheus + Grafana + Loki + Tempo
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rnc-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [rnc-net]
    profiles: [observability]

  grafana:
    image: grafana/grafana:latest
    container_name: rnc-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [rnc-net]
    profiles: [observability]

  loki:
    image: grafana/loki:latest
    container_name: rnc-loki
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks: [rnc-net]
    profiles: [observability]

  tempo:
    image: grafana/tempo:latest
    container_name: rnc-tempo
    ports: ["3200:3200", "4317:4317"]
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks: [rnc-net]
    profiles: [observability]

volumes:
  postgres_data:
  kafka_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  rnc-net:
    driver: bridge
