spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///trust_score_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/rnc
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    enabled: false

rnc:
  scoring:
    initial-score: 500
    min-score: 0
    max-score: 1000
    recalculation-window-days: 365

keycloak:
  server-url: http://localhost:8090
  realm: rnc

logging:
  level:
    bf.rnc: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
