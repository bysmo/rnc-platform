spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///trust_id_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/rnc
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    enabled: false

rnc:
  otp:
    ttl-minutes: 10
    rate-limit-minutes: 0
    rate-limit-max-per-hour: 100
  sms:
    mock: true
    sender: "RNC"
    provider: mock
  keycloak:
    mock: true
  security:
    pepper: "test-pepper-fixed-value"
    encryption:
      key: ""
      hsm:
        enabled: false

keycloak:
  server-url: http://localhost:8090
  realm: rnc
  admin-client-id: admin-cli
  admin-client-secret: ""

logging:
  level:
    bf.rnc: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
