server:
  port: 8081

spring:
  application:
    name: trust-id
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trust-id}
    username: ${POSTGRES_USER:rnc}
    password: ${POSTGRES_PASSWORD:rnc}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.lob.non_contextual_creation: true
        format_sql: false
        default_schema: trust_id
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/rnc
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/rnc/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: trust-id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "bf.rnc.*"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rnc}
    password: ${RABBITMQ_PASSWORD:rnc}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    healthcheck:
      enabled: true
  instance:
    preferIpAddress: true
    leaseRenewalIntervalInSeconds: 10
    leaseExpirationDurationInSeconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,refresh
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 2s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ============================================================
# Configuration RNC spécifique à Trust ID
# ============================================================
rnc:
  service:
    name: trust-id
    description: "Identité financière numérique — KYC, gestion Citoyens"

  # OTP SMS
  otp:
    ttl-minutes: 10
    rate-limit-minutes: 1
    rate-limit-max-per-hour: 5

  # SMS Gateway
  sms:
    mock: true            # true = console log (dev), false = vraie passerelle
    sender: "RNC"
    provider: mock        # mock | orange | moov | telecel

  # Keycloak
  keycloak:
    mock: true            # true = stub (dev), false = vraie intégration Keycloak

  # Sécurité
  security:
    pepper: ${RNC_SECURITY_PEPPER:dev-pepper-change-in-production}
    encryption:
      key: ${RNC_ENCRYPTION_KEY:}
      hsm:
        enabled: false

# Keycloak config (pour Admin Client)
keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8090}
  realm: rnc
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT:admin-cli}
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:}

logging:
  level:
    bf.rnc: INFO
    bf.rnc.services.trust.id: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
