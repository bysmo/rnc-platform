name: RNC CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository -Dstyle.color=always'
  REGISTRY: ghcr.io

jobs:

  # ============================================================
  # Build + Unit tests + Static analysis
  # ============================================================
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile
        run: mvn -B clean compile -DskipTests $MAVEN_OPTS

      - name: Run tests
        run: mvn -B test $MAVEN_OPTS

      - name: Generate JaCoCo report
        run: mvn -B jacoco:report $MAVEN_OPTS

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./**/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ============================================================
  # SonarQube / SonarCloud analysis
  # ============================================================
  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for Sonar

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=rnc-burkina-faso_rnc-platform \
            -Dsonar.organization=rnc-burkina-faso \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml \
            $MAVEN_OPTS

  # ============================================================
  # Build Docker images and push to registry
  # ============================================================
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-test, sonar]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    strategy:
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - auth-service
          - trust-id
          - trust-score
          - trust-qr
          - trust-credit
          - trust-escrow
          - trust-school
          - trust-health
          - trust-farming
          - trust-insurance
          - trust-debt
          - trust-collect
          - trust-merchant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }} JAR
        run: mvn -B -pl ${{ matrix.service }} -am package -DskipTests $MAVEN_OPTS

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./infrastructure/${{ matrix.service }}
          file: ./infrastructure/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:cache,mode=max

  # ============================================================
  # Integration tests with Testcontainers
  # ============================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests
        run: mvn -B verify -Pintegration $MAVEN_OPTS

  # ============================================================
  # Security scan (Trivy)
  # ============================================================
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-images
    if: always() && needs.build-images.result == 'success'
    strategy:
      matrix:
        service: [trust-credit, trust-escrow, trust-id, api-gateway]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================
  # Deploy to K8s (production — main branch only)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, integration-test, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Set K8s context
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.K8S_STAGING_KUBECONFIG }}

      - name: Deploy to staging
        run: |
          for svc in eureka-server config-server api-gateway auth-service \
                     trust-id trust-score trust-qr trust-credit trust-escrow \
                     trust-school trust-health trust-farming trust-insurance \
                     trust-debt trust-collect trust-merchant; do
            kubectl -n rnc-staging apply -f deploy/k8s/$svc.yaml
          done
          kubectl -n rnc-staging rollout restart deployment

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, integration-test, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.rnc.bf
    steps:
      - uses: actions/checkout@v4
      - run: echo "Production deployment requires manual approval"
