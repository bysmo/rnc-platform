global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'rnc-eureka'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka:8761']

  - job_name: 'rnc-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'rnc-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'trust-id:8081'
          - 'trust-score:8082'
          - 'trust-qr:8083'
          - 'trust-credit:8084'
          - 'trust-escrow:8085'
          - 'trust-school:8086'
          - 'trust-health:8087'
          - 'trust-farming:8088'
          - 'trust-insurance:8089'
          - 'trust-debt:8090'
          - 'trust-collect:8091'
          - 'trust-merchant:8092'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
